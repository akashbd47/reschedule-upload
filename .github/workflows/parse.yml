name: Parse PDF

on:
  push:
    paths:
      - 'pdf/upload.pdf'

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install packages
      run: pip install -r requirements.txt

    - name: Run parser
      run: python parser.py
