<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reschedule Upload</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.box{
max-width:400px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:12px;
background:#4b3fe4;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h3>Reschedule Upload</h3>

<input type="file" id="file">

<button onclick="upload()">Upload</button>

<p id="msg"></p>

</div>

<script>

async function upload(){

let file=document.getElementById("file").files[0]

if(!file){

alert("Select PDF")
return

}

let fd=new FormData()

fd.append("file",file)

document.getElementById("msg").innerHTML="Processing..."

let res=await fetch("/upload",{method:"POST",body:fd})

let text=await res.text()

document.getElementById("msg").innerHTML=text

}

</script>

</body>
</html>
